    <path d="M94 652 C260 714 1340 714 1506 652" fill="none" stroke="#0c1827" stroke-width="2.6" opacity=".34"/>
    <path d="M122 568 C282 630 1318 630 1478 568" fill="none" stroke="#d9e4f0" stroke-width="2" opacity=".08"/>
