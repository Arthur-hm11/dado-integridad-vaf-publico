<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Base del dado</title>
  <desc id="desc">Pedestal circular de dos niveles, solido y azul marino, con sombras y brillo suave.</desc>
  <defs>
    <linearGradient id="lower-wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#385378"/>
      <stop offset="18%" stop-color="#223752"/>
      <stop offset="50%" stop-color="#13253d"/>
      <stop offset="82%" stop-color="#1d314d"/>
      <stop offset="100%" stop-color="#3c5a80"/>
    </linearGradient>
    <linearGradient id="upper-wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#456286"/>
      <stop offset="18%" stop-color="#29415e"/>
      <stop offset="50%" stop-color="#182d45"/>
      <stop offset="82%" stop-color="#263d5a"/>
      <stop offset="100%" stop-color="#4a6a8f"/>
    </linearGradient>
    <linearGradient id="wall-shade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#314965" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#081321" stop-opacity=".48"/>
    </linearGradient>
    <radialGradient id="lower-top" cx="50%" cy="34%" r="78%">
