      <stop offset="44%" stop-color="#375170"/>
      <stop offset="78%" stop-color="#243a57"/>
      <stop offset="100%" stop-color="#7d94b0"/>
    </radialGradient>
    <radialGradient id="floor-shadow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#091727" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#091727" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-18" x="-20%" y="-20%" width="140%" height="160%">
