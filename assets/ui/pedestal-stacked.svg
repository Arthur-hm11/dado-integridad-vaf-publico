      <stop offset="42%" stop-color="#314a6b"/>
      <stop offset="76%" stop-color="#223754"/>
      <stop offset="100%" stop-color="#6f88a7"/>
    </radialGradient>
    <radialGradient id="upper-top" cx="50%" cy="35%" r="78%">
